model:
  name: yolov8
  task: classify
  num_classes: 2

labels:
  "0": Gach_Ten
  "1": Ten

preprocess:
  input_size: [128, 512]
  pad_color: 255

paths:
  # Put trained YOLOv8 classification checkpoint here, or override with --checkpoint.
  checkpoint: weights/best.pt

runtime:
  device: auto
  batch_size: 32
