model:
  name: yolov8
  task: classify
  num_classes: 2

labels:
  "0": Gach_Ten
  "1": Ten

preprocess:
  input_size: [128, 512]
  pad_color: 255

paths:
  # Put trained YOLOv8 classification checkpoint here, or override with --checkpoint.
  checkpoint: weights/best.pt

  # Optional folders added to sys.path before loading checkpoint.
  # Use this only if the checkpoint was saved with local modules such as src.data.
  python_paths: []

runtime:
  device: auto
  batch_size: 1
